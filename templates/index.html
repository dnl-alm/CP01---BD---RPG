<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQLgard - RPG Engine</title>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background-color: #1e1e1e;
    color: white;
    padding: 30px;
}

h1{
    margin-bottom: 10px;
}

p{
    margin-bottom: 20px;
}

button{
    padding: 10px 15px;
    border: none;
    cursor: pointer;
    margin-right: 10px;
    border-radius: 5px;
}

button:hover{
    opacity: 0.9;
}

.turno{
    background-color: red;
    color: white;
}

table{
    width: 100%;
    border-collapse: collapse;
    background-color: #2c2c2c;
}

th{
    background-color: #3a3a3a;
}

th, td{
    padding: 10px;
    text-align: center;
    border: 1px solid #555;
}

.hp-bar{
    width: 120px;
    border: 1px solid white;
    margin: auto;
}

.hp{
    height: 10px;
    background-color: #2ecc71;
}

</style>

</head>

<body>

<h1>SQLgard - RPG Engine</h1>

<p>Uma névoa venenosa drena a vida de todos os heróis...</p>

<button onclick="proximoTurno()" class="turno">
Próximo Turno
</button>

<br><br>

<table>

<thead>
<tr>
<th>ID</th>
<th>Nome</th>
<th>Classe</th>
<th>HP</th>
<th>Barra HP</th>
<th>Status</th>
</tr>
</thead>

<tbody id="tabelaHerois">
</tbody>

</table>

<script>

async function carregarHerois(){

    const resposta = await fetch("/herois");
    const dados = await resposta.json();

    const herois = dados.herois;

    const tabela = document.getElementById("tabelaHerois");
    tabela.innerHTML = "";

    herois.forEach(h => {

        let porcentagem = (h.hp_atual / h.hp_max) * 100;

        tabela.innerHTML += `
        <tr>
            <td>${h.id_heroi}</td>
            <td>${h.nome}</td>
            <td>${h.classe}</td>
            <td>${h.hp_atual}/${h.hp_max}</td>

            <td>
                <div class="hp-bar">
                    <div class="hp" style="width:${porcentagem}%"></div>
                </div>
            </td>

            <td>${h.status}</td>
        </tr>
        `;
    });

}

async function proximoTurno(){

    await fetch("/dano-nevoa", {
        method: "PUT"
    });

    carregarHerois();
}

carregarHerois();

</script>

</body>
</html>
